<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giacenze Magazzino</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }

    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: .5px; }
    header h1 span { color: #4cc9f0; }

    .meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: .85rem;
      opacity: .85;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 4px 14px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(1.3); }
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: wrap;
    }

    #search {
      flex: 1;
      min-width: 220px;
      max-width: 360px;
      padding: 9px 14px;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: #4cc9f0; }

    .refresh-btn {
      padding: 9px 18px;
      background: #4cc9f0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn:hover  { background: #38b2db; }
    .refresh-btn:active { transform: scale(.97); }
    .refresh-btn.spinning svg { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #countdown { font-size: .8rem; color: #64748b; margin-left: auto; }

    main { padding: 24px 32px; }

    .summary {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 140px;
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      border-left: 4px solid transparent;
    }
    .card.total { border-color: #4cc9f0; }
    .card.low   { border-color: #f59e0b; }
    .card.zero  { border-color: #ef4444; }

    .card .label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #64748b; margin-bottom: 6px; }
    .card .value { font-size: 1.9rem; font-weight: 700; color: #1a1a2e; }

    .table-wrap {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: .88rem; }

    thead th {
      background: #1a1a2e;
      color: #a8b4c8;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { color: #4cc9f0; }
    thead th.sorted .sort-icon { color: #4cc9f0; }

    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    td { padding: 12px 16px; vertical-align: middle; }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: .75rem;
      font-weight: 600;
    }
    .pill.ok   { background: #dcfce7; color: #15803d; }
    .pill.low  { background: #fef9c3; color: #a16207; }
    .pill.zero { background: #fee2e2; color: #b91c1c; }

    .qty { font-weight: 700; font-size: 1rem; }
    .qty.ok   { color: #15803d; }
    .qty.low  { color: #a16207; }
    .qty.zero { color: #b91c1c; }

    #status {
      padding: 60px;
      text-align: center;
      color: #94a3b8;
      font-size: 1rem;
    }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: #4cc9f0;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 12px;
    }
    .error-msg { color: #ef4444; }

    @media (max-width: 600px) {
      header, .controls, main { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Giacenze <span>Magazzino Nuova Prova SRL</span></h1>
  <div class="meta">
    <span class="badge"><span class="dot"></span> Live</span>
    <span id="last-update">—</span>
  </div>
</header>

<div class="controls">
  <input id="search" type="search" placeholder="Cerca articolo…" />
  <button class="refresh-btn" id="refresh-btn" onclick="loadData(true)">
    <svg id="refresh-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Aggiorna
  </button>
  <span id="countdown"></span>
</div>

<main>
  <div class="summary" id="summary" style="display:none">
    <div class="card total">
      <div class="label">Articoli totali</div>
      <div class="value" id="s-total">0</div>
    </div>
    <div class="card low">
      <div class="label">Scorte basse</div>
      <div class="value" id="s-low">0</div>
    </div>
    <div class="card zero">
      <div class="label">Esauriti</div>
      <div class="value" id="s-zero">0</div>
    </div>
  </div>

  <div class="table-wrap">
    <div id="status">
      <div class="spinner"></div><br>Caricamento dati…
    </div>
    <table id="table" style="display:none">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>
  // ── Config ──────────────────────────────────────────────────────
  const SHEET_ID   = '1j1K0-N40fg9WiEL4vdEVurzEeCczXRU8lLTdrd2aqTs';
  const REFRESH_MS = 30000;   // auto-refresh interval (ms)
  const LOW_STOCK  = 5;       // threshold for "low stock" warning

  let allRows = [];
  let headers = [];
  let sortCol = -1, sortAsc = true;
  let countdownTimer, autoRefreshTimer, loadTimeout;

  // ── JSONP loader (bypasses CORS for file:// and any origin) ─────
  function loadData(manual = false) {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    // Remove any previous JSONP script tag
    const old = document.getElementById('__gjsonp');
    if (old) old.remove();

    // Safety timeout in case the script never calls back
    clearTimeout(loadTimeout);
    loadTimeout = setTimeout(() => {
      btn.classList.remove('spinning');
      showError('Timeout: il foglio non ha risposto. Verifica che sia condiviso pubblicamente.');
    }, 10000);

    // Unique callback name per request to avoid caching issues
    const cbName = '__gvizCallback_' + Date.now();
    window[cbName] = function(data) {
      clearTimeout(loadTimeout);
      btn.classList.remove('spinning');
      delete window[cbName];
      const s = document.getElementById('__gjsonp');
      if (s) s.remove();

      if (!data || !data.table) {
        showError('Risposta non valida dal foglio. Assicurati che il foglio sia condiviso pubblicamente.');
        return;
      }
      parseTable(data.table);
      document.getElementById('last-update').textContent =
        'Aggiornato: ' + new Date().toLocaleTimeString('it-IT');
      resetCountdown();
    };

    const script = document.createElement('script');
    script.id  = '__gjsonp';
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cbName}&t=${Date.now()}`;
    script.onerror = () => {
      clearTimeout(loadTimeout);
      btn.classList.remove('spinning');
      delete window[cbName];
      showError('Impossibile raggiungere il foglio. Controlla la connessione e che il foglio sia pubblico.');
    };
    document.head.appendChild(script);
  }

  // ── Parse gviz table response ───────────────────────────────────
  function parseTable(table) {
    headers = table.cols.map(c => c.label || c.id);

    allRows = table.rows.map(row =>
      row.c.map(cell => {
        if (!cell) return '';
        // Prefer formatted value (f) then raw (v)
        return cell.f != null ? cell.f : (cell.v != null ? String(cell.v) : '');
      })
    );

    renderTable(allRows);
  }

  // ── Render table ────────────────────────────────────────────────
  function renderTable(rows) {
    const statusEl = document.getElementById('status');
    const tableEl  = document.getElementById('table');
    const summDiv  = document.getElementById('summary');

    if (!headers.length) {
      showError('Nessuna colonna trovata nel foglio.');
      return;
    }

    // Build header row
    document.getElementById('thead').innerHTML =
      '<tr>' + headers.map((h, i) =>
        `<th onclick="sortBy(${i})" class="${sortCol === i ? 'sorted' : ''}">
           ${escHtml(h)}&nbsp;<span class="sort-icon">${sortCol === i ? (sortAsc ? '↑' : '↓') : '⇅'}</span>
         </th>`
      ).join('') + '</tr>';

    const qtyIdx = detectQtyCol(headers, rows);

    if (!rows.length) {
      statusEl.innerHTML = '<span>Nessun risultato trovato.</span>';
      statusEl.style.display = '';
      tableEl.style.display  = 'none';
      summDiv.style.display  = 'none';
      return;
    }

    let low = 0, zero = 0;

    document.getElementById('tbody').innerHTML = rows.map(row => {
      const qtyRaw = qtyIdx >= 0
        ? parseFloat(String(row[qtyIdx]).replace(/[^\d.\-]/g, ''))
        : NaN;
      const level = isNaN(qtyRaw) ? 'ok'
                  : qtyRaw <= 0   ? 'zero'
                  : qtyRaw <= LOW_STOCK ? 'low' : 'ok';
      if (level === 'low')  low++;
      if (level === 'zero') zero++;

      const cells = row.map((val, i) => {
        if (i === qtyIdx) {
          const badge = level !== 'ok'
            ? ` <span class="pill ${level}">${level === 'zero' ? 'Esaurito' : 'Bassa'}</span>`
            : '';
          return `<td><span class="qty ${level}">${escHtml(val !== '' ? val : '—')}</span>${badge}</td>`;
        }
        return `<td>${escHtml(String(val))}</td>`;
      }).join('');

      return `<tr>${cells}</tr>`;
    }).join('');

    document.getElementById('s-total').textContent = rows.length;
    document.getElementById('s-low').textContent   = low;
    document.getElementById('s-zero').textContent  = zero;
    summDiv.style.display  = '';
    statusEl.style.display = 'none';
    tableEl.style.display  = '';
  }

  // ── Auto-detect quantity column ─────────────────────────────────
  function detectQtyCol(hdrs, rows) {
    const kw = /giacen|quant|stock|qty|dispo|pezzi|scorta|magaz/i;
    let idx = hdrs.findIndex(h => kw.test(h));
    if (idx >= 0) return idx;
    // Fallback: first column where > 50% values are numeric
    for (let c = 0; c < hdrs.length; c++) {
      const nums = rows.filter(r => r[c] !== '' && !isNaN(parseFloat(r[c]))).length;
      if (rows.length && nums / rows.length > 0.5) return c;
    }
    return -1;
  }

  // ── Sort ────────────────────────────────────────────────────────
  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    const sorted = [...filterRows()].sort((a, b) => {
      const va = a[col], vb = b[col];
      const na = parseFloat(va), nb = parseFloat(vb);
      const cmp = (!isNaN(na) && !isNaN(nb))
        ? na - nb
        : String(va).localeCompare(String(vb), 'it');
      return sortAsc ? cmp : -cmp;
    });
    renderTable(sorted);
  }

  // ── Search ──────────────────────────────────────────────────────
  function filterRows() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    return q ? allRows.filter(row => row.some(c => String(c).toLowerCase().includes(q))) : allRows;
  }

  document.getElementById('search').addEventListener('input', () => {
    let rows = filterRows();
    if (sortCol >= 0) rows.sort((a, b) => {
      const va = a[sortCol], vb = b[sortCol];
      const na = parseFloat(va), nb = parseFloat(vb);
      const cmp = (!isNaN(na) && !isNaN(nb))
        ? na - nb
        : String(va).localeCompare(String(vb), 'it');
      return sortAsc ? cmp : -cmp;
    });
    renderTable(rows);
  });

  // ── Error display ────────────────────────────────────────────────
  function showError(msg) {
    const s = document.getElementById('status');
    s.innerHTML = `<span class="error-msg">⚠ ${escHtml(msg)}</span>`;
    s.style.display = '';
    document.getElementById('table').style.display = 'none';
  }

  // ── Countdown timer ──────────────────────────────────────────────
  function resetCountdown() {
    clearInterval(countdownTimer);
    clearTimeout(autoRefreshTimer);
    let sec = REFRESH_MS / 1000;
    const el = document.getElementById('countdown');
    el.textContent = `Prossimo aggiornamento: ${sec}s`;
    countdownTimer = setInterval(() => {
      sec--;
      el.textContent = `Prossimo aggiornamento: ${sec}s`;
    }, 1000);
    autoRefreshTimer = setTimeout(() => loadData(), REFRESH_MS);
  }

  // ── Utility ──────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── Boot ─────────────────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
